<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prode Mundial 2026 - Dohko Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { background-color: #1e3a8a !important; color: white !important; border-bottom: 4px solid #facc15; }
        .match-card { transition: all 0.2s; border-left: 4px solid #1e3a8a; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-24 font-sans">
    <div class="max-w-7xl mx-auto p-4">
        <header class="text-center py-6 bg-blue-900 text-white rounded-2xl shadow-xl mb-6">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">PRODE MUNDIAL 2026</h1>
            <p class="text-blue-200 text-[10px] font-bold tracking-[0.3em] uppercase text-center">Dashboard de Grupos & Posiciones</p>
        </header>

        <div class="flex overflow-x-auto space-x-2 pb-4 mb-6 no-scrollbar">
            <button onclick="renderGrupo('A')" id="btn-gr-A" class="group-btn flex-shrink-0 w-12 h-12 rounded-xl bg-white shadow font-bold text-blue-900 transition hover:bg-blue-50 active-tab">A</button>
            <button onclick="renderGrupo('B')" id="btn-gr-B" class="group-btn flex-shrink-0 w-12 h-12 rounded-xl bg-white shadow font-bold text-blue-900 transition hover:bg-blue-50">B</button>
            <button onclick="renderGrupo('C')" id="btn-gr-C" class="group-btn flex-shrink-0 w-12 h-12 rounded-xl bg-white shadow font-bold text-blue-900 transition hover:bg-blue-50">C</button>
            <button onclick="renderGrupo('D')" id="btn-gr-D" class="group-btn flex-shrink-0 w-12 h-12 rounded-xl bg-white shadow font-bold text-blue-900 transition hover:bg-blue-50">D</button>
            <button onclick="renderGrupo('E')" id="btn-gr-E" class="group-btn flex-shrink-0 w-12 h-12 rounded-xl bg-white shadow font-bold text-blue-900 transition hover:bg-blue-50">E</button>
            <button onclick="renderGrupo('F')" id="btn-gr-F" class="group-btn flex-shrink-0 w-12 h-12 rounded-xl bg-white shadow font-bold text-blue-900 transition hover:bg-blue-50">F</button>
            <button onclick="renderGrupo('G')" id="btn-gr-G" class="group-btn flex-shrink-0 w-12 h-12 rounded-xl bg-white shadow font-bold text-blue-900 transition hover:bg-blue-50">G</button>
            <button onclick="renderGrupo('H')" id="btn-gr-H" class="group-btn flex-shrink-0 w-12 h-12 rounded-xl bg-white shadow font-bold text-blue-900 transition hover:bg-blue-50">H</button>
            <button onclick="renderGrupo('I')" id="btn-gr-I" class="group-btn flex-shrink-0 w-12 h-12 rounded-xl bg-white shadow font-bold text-blue-900 transition hover:bg-blue-50">I</button>
            <button onclick="renderGrupo('J')" id="btn-gr-J" class="group-btn flex-shrink-0 w-12 h-12 rounded-xl bg-white shadow font-bold text-blue-900 transition hover:bg-blue-50">J</button>
            <button onclick="renderGrupo('K')" id="btn-gr-K" class="group-btn flex-shrink-0 w-12 h-12 rounded-xl bg-white shadow font-bold text-blue-900 transition hover:bg-blue-50">K</button>
            <button onclick="renderGrupo('L')" id="btn-gr-L" class="group-btn flex-shrink-0 w-12 h-12 rounded-xl bg-white shadow font-bold text-blue-900 transition hover:bg-blue-50">L</button>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <div class="lg:w-2/3">
                <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 flex flex-col md:flex-row items-center gap-4 border border-slate-200">
                    <div class="flex-1 w-full">
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 tracking-wider">Identificación (Email)</label>
                        <input type="email" id="userEmail" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-blue-500" placeholder="ejemplo@correo.com">
                    </div>
                    <button onclick="switchView('ranking')" class="px-6 py-3 bg-slate-800 text-white rounded-xl font-bold text-xs hover:bg-black transition shadow-lg">VER RANKING</button>
                </div>
                <div id="matches-container" class="grid gap-4 md:grid-cols-2"></div>
            </div>

            <div class="lg:w-1/3">
                <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden sticky top-6">
                    <div class="bg-blue-900 p-5 text-white">
                        <h3 class="font-black text-sm uppercase tracking-widest flex justify-between items-center">
                            Posiciones <span id="grupo-titulo" class="bg-yellow-400 text-blue-900 px-3 py-0.5 rounded-full text-[10px] font-black">GRUPO A</span>
                        </h3>
                    </div>
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 text-[9px] font-black uppercase">
                                <th class="p-4">Equipo</th>
                                <th class="p-4 text-center">PJ</th>
                                <th class="p-4 text-center">DG</th>
                                <th class="p-4 text-center text-blue-900">Pts</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-body" class="text-sm font-bold text-slate-700"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-full max-w-xs px-4">
        <button onclick="savePredictions()" class="w-full bg-green-500 text-white font-black py-5 rounded-2xl shadow-2xl hover:bg-green-600 transition-all border-b-4 border-green-700 active:translate-y-1 active:border-b-0 uppercase tracking-tighter">
            Confirmar Pronósticos
        </button>
    </div>

    <div id="view-ranking" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[60] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden max-h-[80vh] flex flex-col">
            <div class="p-6 bg-blue-900 text-white flex justify-between items-center">
                <h2 class="font-black text-xl italic">RANKING GLOBAL</h2>
                <button onclick="switchView('grupos')" class="text-white bg-white/20 hover:bg-white/40 px-4 py-2 rounded-xl text-xs font-bold uppercase">Cerrar</button>
            </div>
            <div class="overflow-y-auto flex-1 p-4">
                <table class="w-full">
                    <tbody id="ranking-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-5 right-5 hidden p-4 rounded-xl shadow-2xl text-white font-bold z-[100] transition-all"></div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzmio7-pDu7iLCcx1cmEDq31W1IKx0H4LLkh0T2UdXOEV2kBo800XhwDRn2r6SN8JgN/exec';

        const banderas = {
            'Argentina': '🇦🇷', 'Mexico': '🇲🇽', 'USA': '🇺🇸', 'Canada': '🇨🇦', 'Spain': '🇪🇸', 
            'Brazil': '🇧🇷', 'France': '🇫🇷', 'Germany': '🇩🇪', 'Italy': '🇮🇹', 'Uruguay': '🇺🇾',
            'Ecuador': '🇪🇨', 'Colombia': '🇨🇴', 'Portugal': '🇵🇹', 'Netherlands': '🇳🇱',
            'Belgium': '🇧🇪', 'Croatia': '🇭🇷', 'Morocco': '🇲🇦', 'Japan': '🇯🇵', 
            'Korea Republic': '🇰🇷', 'Poland': '🇵🇱', 'South Africa': '🇿🇦', 'New Zealand': '🇳🇿',
            'Austria': '🇦🇹', 'Scotland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿', 'Algeria': '🇩🇿', 'Nigeria': '🇳🇬', 
            'Australia': '🇦🇺', 'Turkey': '🇹🇷', 'Chile': '🇨🇱', 'Peru': '🇵🇪', 'Switzerland': '🇨🇭',
            'Senegal': '🇸🇳', 'Egypt': '🇪🇬', 'Denmark': '🇩🇰', 'Iran': '🇮🇷', 'Ghana': '🇬🇭',
            'Honduras': '🇭🇳', 'Cameroon': '🇨🇲', 'Hungary': '🇭🇺', 'Jamaica': '🇯🇲',
            'Slovenia': '🇸🇮', 'Paraguay': '🇵🇾', 'Romania': '🇷🇴', 'Mali': '🇲🇱',
            'Serbia': '🇷🇸', 'Norway': '🇳🇴', 'Sweden': '🇸🇪', 'Qatar': '🇶🇦'
        };

        const fixture = {
            'A': [{id:'A1',e1:'México 🇲🇽',e2:'Sudáfrica 🇿🇦'},{id:'A2',e1:'EE.UU. 🇺🇸',e2:'N. Zelanda 🇳🇿'},{id:'A3',e1:'México 🇲🇽',e2:'N. Zelanda 🇳🇿'},{id:'A4',e1:'EE.UU. 🇺🇸',e2:'Sudáfrica 🇿🇦'}],
            'B': [{id:'B1',e1:'Canadá 🇨🇦',e2:'Marruecos 🇲🇦'},{id:'B2',e1:'España 🇪🇸',e2:'Corea Sur 🇰🇷'},{id:'B3',e1:'Canadá 🇨🇦',e2:'Corea Sur 🇰🇷'},{id:'B4',e1:'España 🇪🇸',e2:'Marruecos 🇲🇦'}],
            'C': [{id:'C1',e1:'Brasil 🇧🇷',e2:'Escocia 🏴󠁧󠁢󠁳󠁣󠁴󠁿'},{id:'C2',e1:'Colombia 🇨🇴',e2:'Argelia 🇩🇿'},{id:'C3',e1:'Brasil 🇧🇷',e2:'Argelia 🇩🇿'},{id:'C4',e1:'Colombia 🇨🇴',e2:'Escocia 🏴󠁧󠁢󠁳󠁣󠁴󠁿'}],
            'D': [{id:'D1',e1:'Uruguay 🇺🇾',e2:'Polonia 🇵🇱'},{id:'D2',e1:'Italia 🇮🇹',e2:'Nigeria 🇳🇬'},{id:'D3',e1:'Uruguay 🇺🇾',e2:'Nigeria 🇳🇬'},{id:'D4',e1:'Italia 🇮🇹',e2:'Polonia 🇵🇱'}],
            'E': [{id:'E1',e1:'Francia 🇫🇷',e2:'Australia 🇦🇺'},{id:'E2',e1:'Turquía 🇹🇷',e2:'Chile 🇨🇱'},{id:'E3',e1:'Francia 🇫🇷',e2:'Chile 🇨🇱'},{id:'E4',e1:'Turquía 🇹🇷',e2:'Australia 🇦🇺'}],
            'F': [{id:'F1',e1:'P. Bajos 🇳🇱',e2:'Perú 🇵🇪'},{id:'F2',e1:'Suiza 🇨🇭',e2:'Senegal 🇸🇳'},{id:'F3',e1:'P. Bajos 🇳🇱',e2:'Senegal 🇸🇳'},{id:'F4',e1:'Suiza 🇨🇭',e2:'Perú 🇵🇪'}],
            'G': [{id:'G1',e1:'Alemania 🇩🇪',e2:'Egipto 🇪🇬'},{id:'G2',e1:'Dinamarca 🇩🇰',e2:'Irán 🇮🇷'},{id:'G3',e1:'Alemania 🇩🇪',e2:'Irán 🇮🇷'},{id:'G4',e1:'Dinamarca 🇩🇰',e2:'Egipto 🇪🇬'}],
            'H': [{id:'H1',e1:'Portugal 🇵🇹',e2:'Ghana 🇬🇭'},{id:'H2',e1:'Bélgica 🇧🇪',e2:'Honduras 🇭🇳'},{id:'H3',e1:'Portugal 🇵🇹',e2:'Honduras 🇭🇳'},{id:'H4',e1:'Bélgica 🇧🇪',e2:'Ghana 🇬🇭'}],
            'I': [{id:'I1',e1:'Croacia 🇭🇷',e2:'Camerún 🇨🇲'},{id:'I2',e1:'Hungría 🇭🇺',e2:'Jamaica 🇯🇲'},{id:'I3',e1:'Croacia 🇭🇷',e2:'Jamaica 🇯🇲'},{id:'I4',e1:'Hungría 🇭🇺',e2:'Camerún 🇨🇲'}],
            'J': [{id:'J1',e1:'Eslovenia 🇸🇮',e2:'Paraguay 🇵🇾'},{id:'J2',e1:'Rumania 🇷🇴',e2:'Mali 🇲🇱'},{id:'J3',e1:'Eslovenia 🇸🇮',e2:'Mali 🇲🇱'},{id:'J4',e1:'Rumania 🇷🇴',e2:'Paraguay 🇵🇾'}],
            'K': [{id:'K1',e1:'Serbia 🇷🇸',e2:'Noruega 🇳🇴'},{id:'K2',e1:'Suecia 🇸🇪',e2:'Qatar 🇶🇦'},{id:'K3',e1:'Serbia 🇷🇸',e2:'Qatar 🇶🇦'},{id:'K4',e1:'Suecia 🇸🇪',e2:'Noruega 🇳🇴'}],
            'L': [{id:'L1',e1:'Argentina 🇦🇷',e2:'Austria 🇦🇹'},{id:'L2',e1:'Japón 🇯🇵',e2:'Ecuador 🇪🇨'},{id:'L3',e1:'Argentina 🇦🇷',e2:'Ecuador 🇪🇨'},{id:'L4',e1:'Japón 🇯🇵',e2:'Austria 🇦🇹'}]
        };

        function nombreConBandera(nombre) {
            const emoji = banderas[nombre] || '🏳️';
            return `${nombre} ${emoji}`;
        }

        async function renderGrupo(letra) {
            document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active-tab'));
            const btn = document.getElementById(`btn-gr-${letra}`);
            if(btn) btn.classList.add('active-tab');
            document.getElementById('grupo-titulo').innerText = `GRUPO ${letra}`;

            const mContainer = document.getElementById('matches-container');
            mContainer.innerHTML = '';
            fixture[letra].forEach(m => {
                mContainer.innerHTML += `
                    <div class="match-card bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[9px] font-black bg-blue-50 text-blue-900 px-2 py-0.5 rounded uppercase">ID ${m.id}</span>
                        </div>
                        <div class="grid grid-cols-3 items-center gap-1">
                            <div class="text-center font-bold text-[10px] leading-tight text-slate-700">${m.e1}</div>
                            <div class="flex justify-center space-x-1">
                                <input type="number" id="gA-${m.id}" data-match="${m.e1} vs ${m.e2}" class="w-9 h-10 border-2 border-slate-100 rounded-lg text-center font-bold text-lg focus:border-blue-500 outline-none" placeholder="-">
                                <input type="number" id="gB-${m.id}" class="w-9 h-10 border-2 border-slate-100 rounded-lg text-center font-bold text-lg focus:border-blue-500 outline-none" placeholder="-">
                            </div>
                            <div class="text-center font-bold text-[10px] leading-tight text-slate-700">${m.e2}</div>
                        </div>
                    </div>`;
            });

            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                const tBody = document.getElementById('tabla-body');
                tBody.innerHTML = '';
                data.posiciones.slice(1).forEach(row => {
                    if(row[0] === letra) {
                        tBody.innerHTML += `
                            <tr class="border-b border-slate-50 hover:bg-slate-50 transition">
                                <td class="p-4 text-[11px] font-bold">${nombreConBandera(row[1])}</td>
                                <td class="p-4 text-center font-normal">${row[2]}</td>
                                <td class="p-4 text-center font-normal">${row[3]}</td>
                                <td class="p-4 text-center text-blue-900 font-black">${row[4]}</td>
                            </tr>`;
                    }
                });
            } catch (e) { console.error(e); }
        }

        async function savePredictions() {
            const email = document.getElementById('userEmail').value;
            if(!email) return showToast("Escribe tu email primero", "bg-red-500");
            const inputs = document.querySelectorAll('#matches-container input[id^="gA-"]');
            showToast("Guardando...", "bg-blue-600");
            for (let i = 0; i < inputs.length; i++) {
                const idM = inputs[i].id.split('-')[1];
                const gA = inputs[i].value;
                const gB = document.getElementById(`gB-${idM}`).value;
                if(gA !== "" && gB !== "") {
                    await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ email, partido: inputs[i].dataset.match, golesA: gA, golesB: gB }) });
                }
            }
            showToast("¡Pronóstico guardado!", "bg-green-600");
        }

        async function fetchRanking() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                const rBody = document.getElementById('ranking-body');
                rBody.innerHTML = '';
                data.ranking.slice(1).forEach((row, i) => {
                    rBody.innerHTML += `<tr class="border-b last:border-0"><td class="p-4 font-black text-blue-900 w-12 text-center text-lg">#${i+1}</td><td class="p-4 font-semibold text-slate-600 text-sm">${row[0]}</td><td class="p-4 text-right font-black text-blue-900 text-lg">${row[1]} pts</td></tr>`;
                });
            } catch (e) { console.error(e); }
        }

        function switchView(view) {
            document.getElementById('view-ranking').classList.toggle('hidden', view !== 'ranking');
            if(view === 'ranking') fetchRanking();
        }

        function showToast(msg, color) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed top-5 right-5 p-4 rounded-xl shadow-2xl text-white font-bold z-[100] ${color}`;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        window.onload = () => renderGrupo('A');
    </script>
</body>
</html>
