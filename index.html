<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direccion de Aeronáutica - PRODE Mundial 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-slate-900 font-sans min-h-screen text-slate-800">

    <div class="flex justify-between items-center p-4 bg-white shadow-lg sticky top-0 z-50">
        <img src="assets/logo_aeronautica.png" alt="Aeronáutica" class="h-10 w-auto">
        <div class="text-center">
            <h1 class="text-sm font-black text-blue-900 leading-tight">PRODEMAX IA</h1>
            <p class="text-[9px] text-gray-500 uppercase tracking-widest font-bold">Dirección de Aeronáutica</p>
        </div>
        <img src="assets/logo_mundial.webp" alt="Mundial 2026" class="h-12 w-auto">
    </div>

    <div class="max-w-md mx-auto py-8 px-4">
        
        <div id="registro-usuario" class="glass-card p-8 rounded-[2rem] shadow-2xl border-b-8 border-blue-600">
            <div class="text-center mb-8">
                <div class="inline-block p-3 bg-blue-100 rounded-full mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-black text-slate-900 uppercase">Bienvenido</h2>
                <p class="text-slate-500 text-sm italic">Registrá tu perfil para empezar a sumar puntos.</p>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-bold text-blue-600 uppercase mb-1 ml-1 tracking-wider">Nombre y Apellido</label>
                    <input type="text" id="user-name" placeholder="EJ: TU NOMBRE" 
                           class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 focus:border-blue-500 focus:bg-white outline-none transition-all font-bold">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-blue-600 uppercase mb-1 ml-1 tracking-wider">Área / Departamento</label>
                    <select id="user-area" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 focus:border-blue-500 focus:bg-white outline-none transition-all font-bold">
                        <option value="ADMINISTRACION">ADMINISTRACIÓN</option>
                        <option value="TECNICA">TÉCNICA</option>
                        <option value="OPERACIONES">OPERACIONES</option>
                        <option value="UOTA">UOTA</option>
                    </select>
                </div>

                <button onclick="guardarPerfil()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl transition-all active:scale-95 text-lg mt-4">
                    INGRESAR AL JUEGO
                </button>
            </div>
        </div>

        <div id="prode-main" class="hidden animate-fade-in">
            <div class="bg-gradient-to-r from-blue-900 to-indigo-900 p-6 rounded-3xl text-white mb-8 flex justify-between items-center shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-[10px] text-blue-300 uppercase font-black tracking-widest">Participante</p>
                    <h2 id="display-name" class="text-xl font-black"></h2>
                </div>
                <div class="relative z-10 text-right">
                    <p id="display-area" class="text-[10px] bg-blue-700/50 backdrop-blur-sm px-3 py-1.5 rounded-xl font-black border border-blue-400/30"></p>
                </div>
                <div class="absolute -right-4 -bottom-4 opacity-10">
                    <svg width="100" height="100" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                </div>
            </div>

            <div id="contenedor-partidos" class="space-y-4">
                <div class="text-center py-10">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-white mx-auto"></div>
                    <p class="text-white text-xs mt-4 opacity-50 italic font-bold">Sincronizando con la Dirección...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // URL de tu Apps Script (Debe ser la de la implementación)
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzmio7-pDu7iLCcx1cmEDq31W1IKx0H4LLkh0T2UdXOEV2kBo800XhwDRn2r6SN8JgN/exec";

        document.addEventListener("DOMContentLoaded", function() {
            const nombre = localStorage.getItem("prode_nombre");
            const area = localStorage.getItem("prode_area");

            if (nombre && area) {
                mostrarProde(nombre, area);
            }
        });

        function guardarPerfil() {
            const nombre = document.getElementById("user-name").value.trim().toUpperCase();
            const area = document.getElementById("user-area").value;

            if (nombre.length < 5) {
                alert("⚠️ Por favor, ingresá tu Nombre y Apellido completo.");
                return;
            }

            localStorage.setItem("prode_nombre", nombre);
            localStorage.setItem("prode_area", area);
            mostrarProde(nombre, area);
        }

        function mostrarProde(nombre, area) {
            document.getElementById("registro-usuario").classList.add("hidden");
            document.getElementById("prode-main").classList.remove("hidden");
            document.getElementById("display-name").innerText = nombre;
            document.getElementById("display-area").innerText = area;
            
            // Aquí llamarías a la función para traer partidos
            // fetchPartidos(); 
        }
    </script>
</body>
</html>
