<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prode Mundial 2026 - Dohko Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .group-btn.active { background-color: #1e3a8a; color: white; border-bottom: 4px solid #facc15; }
        .match-card { transition: transform 0.2s; }
        .match-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-20">
    <div class="max-w-4xl mx-auto p-4">
        <header class="text-center py-8">
            <h1 class="text-4xl font-extrabold text-blue-900 mb-2">PRODE 2026 🏆</h1>
            <p class="text-slate-600 uppercase tracking-widest font-semibold">Fase de Grupos</p>
        </header>

        <div class="flex overflow-x-auto space-x-2 mb-8 pb-2 sticky top-0 bg-slate-100 z-10">
            <button onclick="cargarGrupo('A')" class="group-btn px-6 py-3 bg-white rounded-lg shadow font-bold active">Gr. A</button>
            <button onclick="cargarGrupo('B')" class="group-btn px-6 py-3 bg-white rounded-lg shadow font-bold">Gr. B</button>
            <button onclick="cargarGrupo('L')" class="group-btn px-6 py-3 bg-white rounded-lg shadow font-bold">Gr. L</button>
            </div>

        <form id="prodeForm">
            <div class="mb-6 bg-white p-6 rounded-xl shadow-md">
                <label class="block text-sm font-bold text-slate-700 mb-2">Tu Identificación (Email)</label>
                <input type="email" id="userEmail" required class="w-full p-3 border-2 border-slate-200 rounded-lg focus:border-blue-500 outline-none" placeholder="ejemplo@correo.com">
            </div>

            <div id="partidosContainer" class="grid gap-4 md:grid-cols-2">
                </div>

            <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-xs px-4">
                <button type="submit" class="w-full bg-green-600 text-white font-bold py-4 rounded-full shadow-2xl hover:bg-green-700 transition-all uppercase tracking-wide">
                    Guardar Pronósticos
                </button>
            </div>
        </form>

        <div id="status" class="mt-4 text-center hidden p-4 rounded-lg font-bold"></div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxTeoYSXzS67CQcVy9vmgeuRxqBB56ThTFCusNQNZPs7SXVwD72EpTOp8PubeO9XbSc/exec'; // <--- PEGA TU LINK ACÁ
        
        // Datos de ejemplo: Puedes expandir esto con todos los partidos
        const fixture = {
            'A': [
                { id: 'A1', eq1: 'México 🇲🇽', eq2: 'Sudáfrica 🇿🇦' },
                { id: 'A2', eq1: 'EE.UU. 🇺🇸', eq2: 'Nueva Zelanda 🇳🇿' }
            ],
            'B': [
                { id: 'B1', eq1: 'Canadá 🇨🇦', eq2: 'Marruecos 🇲🇦' },
                { id: 'B2', eq1: 'España 🇪🇸', eq2: 'Corea del Sur 🇰🇷' }
            ],
            'L': [
                { id: 'L1', eq1: 'Argentina 🇦🇷', eq2: 'Austria 🇦🇹' },
                { id: 'L2', eq1: 'Argelia 🇩🇿', eq2: 'Jordania 🇯🇴' }
            ]
        };

        function cargarGrupo(letra) {
            const container = document.getElementById('partidosContainer');
            container.innerHTML = '';
            
            // Actualizar botones
            document.querySelectorAll('.group-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            fixture[letra].forEach(p => {
                container.innerHTML += `
                    <div class="match-card bg-white p-4 rounded-xl shadow border-l-8 border-blue-900">
                        <p class="text-xs font-bold text-slate-400 mb-2">PARTIDO ${p.id}</p>
                        <div class="flex items-center justify-between">
                            <div class="text-center w-1/3">
                                <p class="font-bold text-sm">${p.eq1}</p>
                                <input type="number" data-partido="${p.eq1} vs ${p.eq2}" data-equipo="A" class="w-12 h-12 text-2xl font-bold text-center border-2 rounded-lg mt-2" placeholder="0">
                            </div>
                            <div class="font-black text-slate-300">VS</div>
                            <div class="text-center w-1/3">
                                <p class="font-bold text-sm">${p.eq2}</p>
                                <input type="number" data-partido="${p.eq1} vs ${p.eq2}" data-equipo="B" class="w-12 h-12 text-2xl font-bold text-center border-2 rounded-lg mt-2" placeholder="0">
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Cargar grupo A por defecto
        window.onload = () => cargarGrupo('A');

        document.getElementById('prodeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('userEmail').value;
            const status = document.getElementById('status');
            const inputs = document.querySelectorAll('input[type="number"]');
            
            status.classList.remove('hidden');
            status.innerText = "Procesando...";
            status.className = "mt-4 text-center p-4 bg-yellow-100 text-yellow-700 rounded-lg";

            // Agrupamos resultados
            const predicciones = [];
            for (let i = 0; i < inputs.length; i += 2) {
                if(inputs[i].value !== "" && inputs[i+1].value !== "") {
                    predicciones.push({
                        email: email,
                        partido: inputs[i].dataset.partido,
                        golesA: inputs[i].value,
                        golesB: inputs[i+1].value
                    });
                }
            }

            // Enviamos cada predicción al Sheet
            try {
                for (const pred of predicciones) {
                    await fetch(scriptURL, { method: 'POST', body: JSON.stringify(pred) });
                }
                status.innerText = "¡Tus pronósticos del grupo han sido guardados!";
                status.className = "mt-4 text-center p-4 bg-green-100 text-green-700 rounded-lg";
            } catch (err) {
                status.innerText = "Hubo un error al guardar.";
                status.className = "mt-4 text-center p-4 bg-red-100 text-red-700 rounded-lg";
            }
        });
    </script>
</body>
</html>
