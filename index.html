<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prode Mundial 2026 - Dohko Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { background-color: #1e3a8a !important; color: white !important; border-bottom: 4px solid #facc15; }
        .match-card { transition: all 0.3s; border-left: 6px solid #1e3a8a; }
        .match-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-5xl mx-auto p-4">
        <header class="text-center py-6 bg-blue-900 text-white rounded-b-3xl shadow-lg mb-8">
            <h1 class="text-3xl font-black italic">PRODE MUNDIAL 2026</h1>
            <p class="text-blue-200 text-sm font-bold tracking-widest">ESTADOS UNIDOS | MÉXICO | CANADÁ</p>
        </header>

        <nav class="flex justify-center space-x-4 mb-8">
            <button onclick="switchView('grupos')" id="btn-grupos" class="px-6 py-2 rounded-full font-bold bg-white text-blue-900 shadow active-tab">PRONÓSTICOS</button>
            <button onclick="switchView('ranking')" id="btn-ranking" class="px-6 py-2 rounded-full font-bold bg-white text-blue-900 shadow">RANKING GLOBAL</button>
        </nav>

        <div id="view-grupos">
            <div class="bg-white p-6 rounded-2xl shadow-sm mb-6">
                <label class="block text-xs font-black text-gray-400 uppercase mb-2">Usuario Participante</label>
                <input type="email" id="userEmail" required class="w-full p-3 bg-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="tu@email.com">
            </div>

            <div class="flex overflow-x-auto space-x-2 pb-4 mb-6 no-scrollbar">
                "A,B,C,D,E,F,G,H,I,J,K,L".split(',').forEach(letra => {
                    document.write(`<button onclick="renderMatches('${letra}')" class="group-btn flex-shrink-0 w-12 h-12 rounded-xl bg-white shadow font-bold text-blue-900 hover:bg-blue-100 transition" id="btn-gr-${letra}">${letra}</button>`);
                });
            </div>

            <div id="matches-container" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3 mb-24">
                </div>

            <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-md px-6">
                <button onclick="savePredictions()" class="w-full bg-green-500 text-white font-black py-4 rounded-2xl shadow-2xl hover:bg-green-600 transition uppercase text-lg">
                    Guardar Grupo Actual
                </button>
            </div>
        </div>

        <div id="view-ranking" class="hidden">
            <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-blue-900 text-white">
                        <tr>
                            <th class="p-4 uppercase text-xs">Pos</th>
                            <th class="p-4 uppercase text-xs">Usuario</th>
                            <th class="p-4 uppercase text-xs text-right">Puntos</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="toast" class="fixed top-5 right-5 hidden p-4 rounded-xl shadow-2xl text-white font-bold z-50"></div>
    </div>

    <script>
        const scriptURL = 'TU_URL_DE_APPS_SCRIPT_AQUI'; // <--- PEGA TU LINK ACÁ
        
        const fixture = {
            'A': [{id:'A1', e1:'México 🇲🇽', e2:'Sudáfrica 🇿🇦'}, {id:'A2', e1:'EE.UU. 🇺🇸', e2:'N. Zelanda 🇳🇿'}],
            'B': [{id:'B1', e1:'Canadá 🇨🇦', e2:'Marruecos 🇲🇦'}, {id:'B2', e1:'España 🇪🇸', e2:'Corea Sur 🇰🇷'}],
            'C': [{id:'C1', e1:'Brasil 🇧🇷', e2:'Escocia 🏴󠁧󠁢󠁳󠁣󠁴󠁿'}, {id:'C2', e1:'Colombia 🇨🇴', e2:'Argelia 🇩🇿'}],
            'D': [{id:'D1', e1:'Uruguay 🇺🇾', e2:'Polonia 🇵🇱'}, {id:'D2', e1:'Italia 🇮🇹', e2:'Nigeria 🇳🇬'}],
            'E': [{id:'E1', e1:'Francia 🇫🇷', e2:'Australia 🇦🇺'}, {id:'E2', e1:'Turquía 🇹🇷', e2:'Chile 🇨🇱'}],
            'F': [{id:'F1', e1:'Países Bajos 🇳🇱', e2:'Perú 🇵🇪'}, {id:'F2', e1:'Suiza 🇨🇭', e2:'Senegal 🇸🇳'}],
            'G': [{id:'G1', e1:'Alemania 🇩🇪', e2:'Egipto 🇪🇬'}, {id:'G2', e1:'Dinamarca 🇩🇰', e2:'Irán 🇮🇷'}],
            'H': [{id:'H1', e1:'Portugal 🇵🇹', e2:'Ghana 🇬🇭'}, {id:'H2', e1:'Bélgica 🇧🇪', e2:'Honduras 🇭🇳'}],
            'I': [{id:'I1', e1:'Croacia 🇭🇷', e2:'Camerún 🇨🇲'}, {id:'I2', e1:'Hungría 🇭🇺', e2:'Jamaica 🇯🇲'}],
            'J': [{id:'J1', e1:'Slovenia 🇸🇮', e2:'Paraguay 🇵🇾'}, {id:'J2', e1:'Rumania 🇷🇴', e2:'Mali 🇲🇱'}],
            'K': [{id:'K1', e1:'Serbia 🇷🇸', e2:'Noruega 🇳🇴'}, {id:'K2', e1:'Suecia 🇸🇪', e2:'Qatar 🇶🇦'}],
            'L': [{id:'L1', e1:'Argentina 🇦🇷', e2:'Austria 🇦🇹'}, {id:'L2', e1:'Japón 🇯🇵', e2:'Ecuador 🇪🇨'}]
        };

        function switchView(view) {
            document.getElementById('view-grupos').classList.toggle('hidden', view !== 'grupos');
            document.getElementById('view-ranking').classList.toggle('hidden', view !== 'ranking');
            document.getElementById('btn-grupos').classList.toggle('active-tab', view === 'grupos');
            document.getElementById('btn-ranking').classList.toggle('active-tab', view === 'ranking');
            if(view === 'ranking') fetchRanking();
        }

        function renderMatches(letra) {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';
            document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`btn-gr-${letra}`).classList.add('active-tab');

            fixture[letra].forEach(m => {
                container.innerHTML += `
                    <div class="match-card bg-white p-5 rounded-2xl shadow-sm">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[10px] font-black bg-blue-100 text-blue-900 px-2 py-1 rounded">MATCH ${m.id}</span>
                        </div>
                        <div class="grid grid-cols-3 items-center gap-2">
                            <div class="text-center"><p class="text-xs font-bold">${m.e1}</p></div>
                            <div class="flex justify-center space-x-1">
                                <input type="number" id="gA-${m.id}" data-match="${m.e1} vs ${m.e2}" class="w-10 h-12 border-2 border-slate-200 rounded-lg text-center font-bold text-xl focus:border-blue-500 outline-none" placeholder="0">
                                <input type="number" id="gB-${m.id}" class="w-10 h-12 border-2 border-slate-200 rounded-lg text-center font-bold text-xl focus:border-blue-500 outline-none" placeholder="0">
                            </div>
                            <div class="text-center"><p class="text-xs font-bold">${m.e2}</p></div>
                        </div>
                    </div>`;
            });
        }

        async function savePredictions() {
            const email = document.getElementById('userEmail').value;
            if(!email) return showToast("Escribe tu email", "bg-red-500");
            
            const inputs = document.querySelectorAll('#matches-container input[id^="gA-"]');
            showToast("Guardando pronósticos...", "bg-blue-500");

            for (let i = 0; i < inputs.length; i++) {
                const idMatch = inputs[i].id.split('-')[1];
                const gA = inputs[i].value;
                const gB = document.getElementById(`gB-${idMatch}`).value;
                
                if(gA !== "" && gB !== "") {
                    await fetch(scriptURL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            email: email,
                            partido: inputs[i].dataset.match,
                            golesA: gA,
                            golesB: gB
                        })
                    });
                }
            }
            showToast("¡Grupo guardado!", "bg-green-500");
        }

        async function fetchRanking() {
            const res = await fetch(scriptURL);
            const data = await res.json();
            const body = document.getElementById('ranking-body');
            body.innerHTML = '';
            // Ignoramos encabezado y mostramos
            data.slice(1).forEach((row, i) => {
                body.innerHTML += `
                    <tr class="border-b border-slate-100">
                        <td class="p-4 font-bold text-blue-900">#${i+1}</td>
                        <td class="p-4 text-sm font-medium text-slate-600">${row[0]}</td>
                        <td class="p-4 text-right font-black text-blue-900">${row[1]} pts</td>
                    </tr>`;
            });
        }

        function showToast(msg, color) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed top-5 right-5 p-4 rounded-xl shadow-2xl text-white font-bold z-50 ${color}`;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        renderMatches('A');
    </script>
</body>
</html>
